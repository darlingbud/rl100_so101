name: cloth

task_name: cloth
crop_shape: null
  # - 224
  # - 240

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    rgb_head:
      shape: [3, 240, 320]
      type: rgb
    rgb_left_hand:
      shape: [3, 240, 320]
      type: rgb
    rgb_right_hand:
      shape: [3, 240, 320]
      type: rgb
    agent_pos:
      shape: [14]
      type: low_dim
  action:
    shape: [26]

env_runner:
  _target_: rl_100.env_runner.pusht_runner.PushT
  eval_episodes: 16
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  task_name: door
  render_size: 84
  use_point_crop: ${policy.use_point_crop}
  env_num: 8
  fake_env: False

dataset:
  _target_: rl_100.dataset.cloth.Cloth
  zarr_path: data/cloth_rgb_240_320_action.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 900000000
  pre_image_norm: False
  rgb_head_shape: ${shape_meta.obs.rgb_head.shape}
  rgb_right_hand_shape: ${shape_meta.obs.rgb_right_hand.shape}
  rgb_left_hand_shape: ${shape_meta.obs.rgb_left_hand.shape}
  
critic_dataset:
  _target_: rl_100.dataset.adroit_dataset.AdroitDataset
  zarr_path: data/adroit_door_medium.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: 900000
  pre_image_norm: False
scale_dataset:
  _target_: rl_100.dataset.adroit_dataset.AdroitDataset
  zarr_path: data/adroit_door_medium.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: 900000
  scale_strategy: 'dynamic'
  pre_image_norm: False
