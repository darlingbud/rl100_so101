name: shelf-place

task_name: ${name}

shape_meta: &shape_meta
  obs:
    image:
      shape: [3, 84, 84]
      type: rgb
    point_cloud:
      shape: [512, 3]
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dim
  action:
    shape: [4]

env_runner:
  _target_: rl_100.env_runner.metaworld_runner.MetaworldRunner
  eval_episodes: 20
  max_steps: 200
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  n_envs: null
  n_train: null
  n_test: null
  task_name: ${task_name}
  device: ${training.device}
  use_point_crop: ${policy.use_point_crop}
  env_num: 8

dataset:
  _target_: rl_100.dataset.metaworld_dataset.MetaworldDataset
  zarr_path: data/metaworld_shelf-place_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
critic_dataset:
  _target_: rl_100.dataset.metaworld_dataset.MetaworldDataset
  zarr_path: data/metaworld_shelf-place_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.0
  max_train_episodes: 90
scale_dataset:
  _target_: rl_100.dataset.metaworld_dataset.MetaworldDataset
  zarr_path: data/metaworld_shelf-place_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.0
  max_train_episodes: 90
  scale_strategy: 'dynamic'