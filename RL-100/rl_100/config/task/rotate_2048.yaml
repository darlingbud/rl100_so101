name: rotate_1024_arm

task_name: rotate_1024_arm

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    image:
      shape: [3, 224, 224]
      type: rgb
    point_cloud:
      shape: [2048, 6]
      type: point_cloud
    agent_pos:
      shape: [23]
      type: low_dim
  action:
    shape: [23]

env_runner:
  _target_: rl_100.env_runner.rotate_runner.Rotate
  eval_episodes: 16
  max_steps: 1000
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  task_name: rotate
  render_size: 84
  use_point_crop: ${policy.use_point_crop}
  env_num: 8
  fake_env: False
  state_shape: 6
  num_points: ${shape_meta.obs.point_cloud.shape[0]}
  use_rgb: False
  save_image: False
norm_dataset:
  _target_: rl_100.dataset.rotate_dataset.RotateDataset
  zarr_path: data/data_rotate_100_arm_1024.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 9000000
  pre_image_norm: False
dataset:
  _target_: rl_100.dataset.rotate_dataset_pc.RotateDataset
  zarr_path: data/data_rotate_100_arm_1024.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 9000000
  pre_image_norm: False
critic_dataset:
  _target_: rl_100.dataset.rotate_dataset.RotateDataset
  zarr_path: data/data_rotate_100_arm_1024.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: 9000000
  pre_image_norm: False
scale_dataset:
  _target_: rl_100.dataset.rotate_dataset.RotateDataset
  zarr_path: data/data_rotate_100_arm_1024.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: 9000000
  scale_strategy: 'dynamic'
  pre_image_norm: False
