defaults:
  - rl100_2d_epsilon
  - override task: ro101_clip
  - _self_

name: train_ro101_2d_bc
exp_name: ro101_clip_bc

# The dedicated train_bc.py entry stops after imitation learning.
only_bc: true
stop_after_bc: true
offline: false
online: false
eval: false
use_wandb: true
env_num: 1

horizon: 8
n_obs_steps: 5
n_action_steps: 4
dataset_obs_steps: ${n_obs_steps}

# Establish a plain supervised baseline before adding information bottleneck
# and reconstruction regularization.
use_recon: true
use_vib: true
kl_annealing: true

policy:
  scheduler_type: ddim
  use_cm: false
  img_shape: [3, 480, 640]
  use_aug: true
  ddim_noise_scheduler:
    prediction_type: epsilon

encoders:
  resnet:
    resize_shape: [224, 224]
    crop_shape: null
    random_crop: false
    share_rgb_model: true
    rgb_model:
      weights: IMAGENET1K_V1
    recon_loss_weight: 0.05
    kl_loss_weight: 1.0
    kl_beta: 1.0e-4

dataloader:
  batch_size: 32
  num_workers: 8
  shuffle: true
  pin_memory: false
  persistent_workers: false

val_dataloader:
  batch_size: 16
  num_workers: 2
  shuffle: false
  pin_memory: false
  persistent_workers: false

training:
  device: cuda:0
  resume: false
  reset_lr_scheduler_on_resume: false
  resume_lr: null
  resume_lr_warmup_steps: 0
  use_ema: false
  num_epochs: 500
  gradient_accumulate_every: 2
  lr_warmup_steps: 500
  checkpoint_every: 25
  val_every: 5
  log_gradient_norms: false
  gradient_norm_every: 100

checkpoint:
  save_ckpt: true
  save_last_ckpt: true
